name: Cloud APK Compiler

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Unpack Project Zip Archive
      run: |
        sudo apt-get install unzip
        unzip -o launcher.zip

    - name: Force Inject Master Configurations
      run: |
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.3.2' apply false
            id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
            id 'com.google.dagger.hilt.android' version '2.51' apply false
        }
        EOF

        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "GlassLauncher"
        include ':app'
        EOF

    - name: Mount Java 17 Engine
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set Up Gradle System
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.7

    - name: Run Production Compile Execution
      run: gradle assembleDebug

    - name: Upload Finished App Binary
      uses: actions/upload-artifact@v4
      with:
        name: GlassLauncher-APK
        path: app/build/outputs/apk/debug/app-debug.apk
