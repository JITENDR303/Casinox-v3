name: Cloud APK Compiler

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Unpack Project Zip Archive
      run: |
        sudo apt-get install unzip
        unzip -o launcher.zip

    - name: Mount Java 17 Engine
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set Up Gradle Build System
      uses: gradle/actions/setup-gradle@v4

    - name: Run Production Compile Execution
      run: gradle assembleDebug

    - name: Upload Finished App Binary
      uses: actions/upload-artifact@v4
      with:
        name: GlassLauncher-APK
        path: app/build/outputs/apk/debug/app-debug.apk
