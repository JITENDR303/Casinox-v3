name: Cloud APK Compiler

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Unpack Project Zip Archive
      run: |
        sudo apt-get install unzip
        unzip -o launcher.zip

    - name: Force Inject Clean App Build Configuration
      run: |
        # Create root build.gradle
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.3.2' apply false
            id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
            id 'com.google.dagger.hilt.android' version '2.51' apply false
        }
        EOF

        # Create root settings.gradle
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "GlassLauncher"
        include ':app'
        EOF

        # Create a perfect, fully-loaded app/build.gradle with all missing UI libraries
        mkdir -p app
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
            id 'com.google.dagger.hilt.android'
            id 'kotlin-kapt'
        }

        android {
            namespace 'com.prime.launcher'
            compileSdk 34

            defaultConfig {
                applicationId "com.prime.launcher"
                minSdk 26
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }

            buildTypes {
                release {
                    minifyEnabled false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
            }
            buildFeatures {
                compose true
            }
            composeOptions {
                kotlinCompilerExtensionVersion '1.5.8'
            }
        }

        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
            implementation 'androidx.activity:activity-compose:1.8.2'
            
            // Jetpack Compose & Material 3 Engineering libraries
            implementation platform('androidx.compose:compose-bom:2024.02.00')
            implementation 'androidx.compose.ui:ui'
            implementation 'androidx.compose.ui:ui-graphics'
            implementation 'androidx.compose.ui:ui-tooling-preview'
            implementation 'androidx.compose.material3:material3:1.2.1'
            implementation 'androidx.compose.material:material-icons-extended'

            // Lifecycle Compose utilities (Fixes collectAsStateWithLifecycle)
            implementation 'androidx.lifecycle:lifecycle-runtime-compose:2.7.0'

            // Dependency Injection (Fixes hiltViewModel engine tools)
            implementation 'com.google.dagger:hilt-android:2.51'
            kapt 'com.google.dagger:hilt-compiler:2.51'
            implementation 'androidx.hilt:hilt-navigation-compose:1.2.0'
        }
        EOF

    - name: Mount Java 17 Engine
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set Up Gradle Build System
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.7

    - name: Run Production Compile Execution
      run: gradle assembleDebug

    - name: Upload Finished App Binary
      uses: actions/upload-artifact@v4
      with:
        name: GlassLauncher-APK
        path: app/build/outputs/apk/debug/app-debug.apk
